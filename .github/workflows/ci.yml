name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lambda:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: discord_bot/go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
      - run: go test ./...
      - run: go build ./...

  cli:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: cli
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.6'
      - run: go test ./...
      - run: go build ./...
